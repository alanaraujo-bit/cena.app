packages:
  - "apps/*"
  - "packages/*"
# Disable pnpm's recent-publish gate for this project: we intentionally track
# freshly published official Expo SDK packages, which the age policy blocks.
minimumReleaseAge: 0
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  argon2: true
  esbuild: true
  prisma: true
minimumReleaseAgeExclude:
  - '@expo/cli@57.0.4'
  - '@expo/config-plugins@57.0.2'
  - '@expo/config@57.0.2'
  - '@expo/env@2.4.1'
  - '@expo/fingerprint@0.20.2'
  - '@expo/image-utils@0.11.1'
  - '@expo/local-build-cache-provider@57.0.2'
  - '@expo/metro-config@57.0.3'
  - '@expo/prebuild-config@57.0.4'
  - '@expo/require-utils@57.0.1'
  - '@expo/schema-utils@57.0.1'
  - expo-asset@57.0.3
  - expo-constants@57.0.3
  - expo-modules-autolinking@57.0.4
  - expo-modules-core@57.0.2
  - expo@57.0.2
  - '@expo/metro-runtime@57.0.3'
  - '@expo/ui@57.0.3'
  - expo-router@57.0.3
  - expo-splash-screen@57.0.2
  - '@expo/cli@56.1.18'
  - '@expo/config-plugins@56.0.11'
  - '@expo/config@56.0.11'
  - '@expo/env@2.3.1'
  - '@expo/fingerprint@0.19.6'
  - '@expo/image-utils@0.10.2'
  - '@expo/inline-modules@0.0.13'
  - '@expo/local-build-cache-provider@56.0.9'
  - '@expo/metro-config@56.0.16'
  - '@expo/prebuild-config@56.0.18'
  - '@expo/require-utils@56.1.4'
  - '@expo/schema-utils@56.0.2'
  - expo-constants@56.0.20
  - expo-modules-autolinking@56.0.18
  - expo-modules-core@56.0.19
  - expo-modules-jsi@56.0.11
  - expo@56.0.14
